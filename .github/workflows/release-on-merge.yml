name: Build and release after PR merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Prepare release metadata
        id: metadata
        run: |
          set -euo pipefail

          VERSION_NAME=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="0.0.0"
          fi

          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$SIGNED_APK" ]; then
            echo "Signed release APK not found at $SIGNED_APK"
            exit 1
          fi

          TAG="v${VERSION_NAME}-${GITHUB_RUN_NUMBER}"
          APK_NAME="noyt-droid-${TAG}.apk"

          cp "$SIGNED_APK" "$APK_NAME"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: Release ${{ steps.metadata.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.apk_name }}
