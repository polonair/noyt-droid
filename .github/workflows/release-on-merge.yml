name: Build and release after PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Prepare release metadata
        id: metadata
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="0.0.0"
          fi

          TAG="v${VERSION_NAME}-${GITHUB_RUN_NUMBER}"
          APK_NAME="noyt-droid-${TAG}.apk"

          cp app/build/outputs/apk/release/app-release-unsigned.apk "$APK_NAME"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: Release ${{ steps.metadata.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.apk_name }}
