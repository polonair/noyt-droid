name: Build and release after PR merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Prepare release metadata and sign APK
        id: metadata
        run: |
          set -euo pipefail

          VERSION_NAME=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="0.0.0"
          fi

          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK not found at $UNSIGNED_APK"
            exit 1
          fi

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner tool was not found in $ANDROID_HOME/build-tools"
            exit 1
          fi

          keytool -genkeypair \
            -keystore release-signing-key.jks \
            -alias release \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=GitHub Actions, OU=CI, O=noyt-droid, L=NA, S=NA, C=US"

          "$APKSIGNER" sign \
            --ks release-signing-key.jks \
            --ks-key-alias release \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          "$APKSIGNER" verify "$SIGNED_APK"

          TAG="v${VERSION_NAME}-${GITHUB_RUN_NUMBER}"
          APK_NAME="noyt-droid-${TAG}.apk"

          cp "$SIGNED_APK" "$APK_NAME"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: Release ${{ steps.metadata.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.apk_name }}
